apiVersion: apps/v1
kind: Deployment
metadata:
  name: petclinic
spec:
  replicas: 3
  selector:
    matchLabels:
      app: petclinic
  template:
    metadata:
      labels:
        app: petclinic
    spec:
      containers:
      - name: petclinic
        image: 985635452569.dkr.ecr.us-east-1.amazonaws.com/spring/petclinic:latest
        ports:
        - containerPort: 8080
